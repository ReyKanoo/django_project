{% extends "blocks/base.html" %}

{% block title %}Редактировать: {{ block.title }}{% endblock %}

{% block content %}
    <h1>Редактировать текст блокировки</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Сохранить</button>
        <a href="{% url 'block_list' %}">Отмена</a>
    </form>
{% endblock %}
